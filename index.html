<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBTI 인격 테스트</title>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.min.js"></script>
  <style>
    :root {
      --color-primary: #E879A4;
      --color-primary-dark: #D4658F;
      --color-primary-light: #F5A3C4;
      --color-secondary: #C084FC;
      --color-secondary-dark: #A78BFA;
      --color-bg: #FFF5F9;
      --color-card: #FFFFFF;
      --color-text: #3D2C3E;
      --color-text-light: #8B7A8E;
      --color-text-dim: #B8A0BC;
      --color-line: #FCE7F0;
      --shadow-card: 0 8px 30px rgba(232, 121, 164, 0.10);
      --shadow-btn: 0 4px 20px rgba(232, 121, 164, 0.30);
      --radius: 24px;
      --radius-lg: 28px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
      background-color: var(--color-bg);
      background-image:
        radial-gradient(circle at 10% 0%, rgba(232,121,164,0.10) 0, transparent 40%),
        radial-gradient(circle at 90% 100%, rgba(192,132,252,0.10) 0, transparent 40%);
      color: var(--color-text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
    }

    .shell {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 18px 20px 32px;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3, p { margin: 0; }
    button { border: 0; cursor: pointer; font: inherit; transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease; }
    button:active { transform: scale(0.98); }
    button:disabled { cursor: not-allowed; opacity: 0.5; transform: none; }

    /* 떠다니는 배경 이모지 */
    .deco {
      position: absolute;
      pointer-events: none;
      user-select: none;
      opacity: 0.18;
      font-size: 26px;
    }
    .deco.d1 { top: 60px;  left: 18px;  animation: float 3s ease-in-out infinite; }
    .deco.d2 { top: 110px; right: 24px; animation: float 3.4s ease-in-out infinite .5s; opacity:.14; font-size:22px; }
    .deco.d3 { top: 240px; left: 26px;  animation: sparkle 2.2s ease-in-out infinite 1s; opacity:.2; font-size:20px; }
    .deco.d4 { bottom: 160px; right: 22px; animation: float 3s ease-in-out infinite 1.5s; opacity:.15; font-size:28px; }
    .deco.d5 { bottom: 240px; left: 26px; animation: sparkle 2.6s ease-in-out infinite .8s; opacity:.18; }
    .deco.d6 { bottom: 90px; right: 36px; animation: float 3.2s ease-in-out infinite 2s; opacity:.15; font-size:22px; }

    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      33% { transform: translateY(-6px) rotate(3deg); }
      66% { transform: translateY(3px) rotate(-2deg); }
    }
    @keyframes sparkle {
      0%,100% { opacity: 0.2; transform: scale(0.85); }
      50% { opacity: 0.5; transform: scale(1.15); }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scale-in {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes bounce-slow {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes bounce-dot {
      0%,80%,100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      25% { transform: rotate(8deg); }
      75% { transform: rotate(-8deg); }
    }
    @keyframes paw-pulse {
      0%,100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .animate-fade-in { animation: fade-in .4s ease-out; }
    .animate-slide-up { animation: slide-up .5s ease-out both; }
    .animate-scale-in { animation: scale-in .45s ease-out both; }

    /* ─── 화면 ─── */
    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; animation: fade-in .35s ease-out; }

    /* ─── INTRO ─── */
    #intro { justify-content: center; align-items: center; text-align: center; padding: 40px 0; }
    .brand-logo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFB7D5 0%, #E879A4 50%, #C084FC 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.04em;
      box-shadow: 0 12px 32px rgba(232,121,164,0.35);
      animation: bounce-slow 2.4s ease-in-out infinite;
      margin-bottom: 22px;
    }
    .intro-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.025em;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .intro-sub {
      font-size: 14px;
      color: var(--color-text-light);
      line-height: 1.75;
      margin-bottom: 36px;
    }
    .start-btn {
      width: 100%;
      max-width: 320px;
      padding: 18px;
      background: linear-gradient(135deg, #E879A4 0%, #C084FC 100%);
      color: #fff;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 800;
      box-shadow: var(--shadow-btn);
    }
    .start-btn:hover { box-shadow: 0 6px 26px rgba(232,121,164,0.40); transform: translateY(-1px); }
    .intro-meta { margin-top: 22px; font-size: 12px; color: var(--color-text-dim); line-height: 1.8; }
    .intro-meta a { color: var(--color-secondary); text-decoration: none; }
    .intro-meta a:hover { text-decoration: underline; }
    .history-link {
      margin-top: 18px;
      display: inline-block;
      color: var(--color-secondary);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      opacity: 0.7;
      cursor: pointer;
      background: none;
      border: 0;
    }
    .history-link:hover { opacity: 1; }

    /* ─── QUIZ ─── */
    #quiz { padding-top: 8px; }
    .quiz-progress {
      margin-bottom: 12px;
    }
    .quiz-progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--color-text-light);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .quiz-progress-text .pct { color: var(--color-primary); }
    .quiz-progress-bar {
      width: 100%;
      height: 8px;
      background: #FCE7F0;
      border-radius: 999px;
      overflow: hidden;
    }
    .quiz-progress-bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #E879A4, #C084FC);
      border-radius: inherit;
      transition: width .35s ease;
    }
    .quiz-stage-msg {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 4px 0 6px;
    }
    .stage-pill {
      background: rgba(232, 121, 164, 0.10);
      color: var(--color-primary);
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      animation: fade-in .4s ease-out;
    }

    .quiz-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8px 0;
    }
    .quiz-emoji {
      text-align: center;
      font-size: 64px;
      margin-bottom: 18px;
      animation: scale-in .4s ease-out;
    }
    .quiz-question {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.6;
      text-align: center;
      margin-bottom: 24px;
      animation: fade-in .4s ease-out;
      color: var(--color-text);
    }
    .quiz-question.long {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.7;
      text-align: left;
      background: #fff;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--color-line);
    }

    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      width: 100%;
      padding: 18px 20px;
      border-radius: 20px;
      border: 2px solid #F0E0EA;
      background: #fff;
      text-align: left;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--color-text);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: slide-up .4s ease-out both;
    }
    .option-btn:hover { border-color: var(--color-primary-light); background: #FFF9FC; }
    .option-btn.selected {
      border-color: var(--color-primary);
      background: linear-gradient(135deg, #FFF0F7, #F8EBFF);
      transform: scale(0.98);
      box-shadow: 0 4px 14px rgba(232,121,164,0.20);
    }
    .option-code {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #FFE4EE;
      color: var(--color-primary);
      font-weight: 800;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .option-btn.selected .option-code {
      background: linear-gradient(135deg, #E879A4, #C084FC);
      color: #fff;
    }

    .quiz-back {
      margin-top: 20px;
      text-align: center;
      background: none;
      border: 0;
      color: var(--color-text-dim);
      font-size: 13px;
      font-weight: 600;
      padding: 8px;
    }
    .quiz-back:hover { color: var(--color-text-light); }

    /* ─── ANALYZING ─── */
    #analyzing { justify-content: center; align-items: center; text-align: center; padding: 40px 0; }
    .analyzing-icon {
      position: relative;
      margin-bottom: 32px;
    }
    .analyzing-icon .main { font-size: 72px; animation: bounce-slow 2s ease-in-out infinite; }
    .analyzing-icon .sub1 {
      position: absolute;
      top: -8px;
      right: -20px;
      font-size: 32px;
      animation: paw-pulse 1.5s ease-in-out infinite;
    }
    .analyzing-icon .sub2 {
      position: absolute;
      bottom: -8px;
      left: -20px;
      font-size: 26px;
      animation: paw-pulse 1.5s ease-in-out infinite 0.7s;
    }
    .analyzing-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .analyzing-title .accent {
      background: linear-gradient(135deg, #E879A4, #C084FC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .analyzing-sub { font-size: 14px; color: var(--color-text-light); margin-bottom: 32px; }
    .dots { display: flex; gap: 8px; }
    .dots > div {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--color-primary);
      animation: bounce-dot 1.4s ease-in-out infinite both;
    }
    .dots > div:nth-child(1) { animation-delay: -0.3s; }
    .dots > div:nth-child(2) { animation-delay: -0.15s; }

    /* ─── RESULT ─── */
    #result { padding-top: 24px; }
    .step-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-bottom: 16px;
    }
    .step-icon {
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scale-in .5s ease-out;
      margin-bottom: 6px;
    }
    .step-icon .emoji-lg { font-size: 64px; }
    .step-kicker {
      font-size: 13px;
      color: var(--color-text-light);
      font-weight: 700;
      margin-bottom: 6px;
      animation: slide-up .5s ease-out both;
      animation-delay: .15s;
    }
    .step-heading {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.4;
      margin-bottom: 24px;
      animation: slide-up .5s ease-out both;
      animation-delay: .3s;
    }
    .step-heading .grad {
      background: linear-gradient(135deg, #E879A4, #C084FC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hint-cards {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }
    .hint-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 16px 18px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--color-text);
      border: 1px solid var(--color-line);
      animation: slide-up .5s ease-out both;
      text-align: left;
    }
    .hint-card .label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: var(--color-primary);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .axis-list {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }
    .axis-item {
      background: #fff;
      border-radius: 20px;
      padding: 16px 18px;
      border: 1px solid var(--color-line);
      animation: slide-up .5s ease-out both;
    }
    .axis-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .axis-name { font-size: 13px; font-weight: 800; color: var(--color-text-light); }
    .axis-pct { font-size: 16px; font-weight: 900; color: var(--color-primary); }
    .axis-bar {
      width: 100%;
      height: 10px;
      background: #FCE7F0;
      border-radius: 999px;
      overflow: hidden;
    }
    .axis-bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #E879A4, #C084FC);
      border-radius: inherit;
      transition: width 1s ease;
    }

    .reveal-code {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #E879A4, #C084FC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 8px 0 18px;
      animation: scale-in .6s ease-out both;
      animation-delay: .2s;
    }
    .reveal-nick {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 14px;
      animation: slide-up .5s ease-out both;
      animation-delay: .4s;
    }
    .reveal-intro {
      font-size: 14px;
      color: var(--color-text-light);
      line-height: 1.7;
      max-width: 320px;
      margin: 0 auto;
      animation: slide-up .5s ease-out both;
      animation-delay: .6s;
    }
    .match-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      padding: 9px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, #FFE4EE, #F3E0FF);
      color: var(--color-primary-dark);
      font-weight: 800;
      font-size: 13px;
      animation: slide-up .5s ease-out both;
      animation-delay: .8s;
    }

    .step-cta {
      width: 100%;
      max-width: 320px;
      padding: 16px 22px;
      background: linear-gradient(135deg, #E879A4 0%, #C084FC 100%);
      color: #fff;
      border-radius: 999px;
      font-weight: 800;
      font-size: 15px;
      box-shadow: var(--shadow-btn);
      margin-top: 24px;
      animation: slide-up .5s ease-out both;
      animation-delay: .9s;
    }
    .step-cta:hover { box-shadow: 0 6px 26px rgba(232,121,164,0.40); transform: translateY(-1px); }

    .dot-indicator {
      display: flex;
      gap: 6px;
      margin: 18px 0 6px;
      justify-content: center;
    }
    .dot-indicator > div {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #F0E0EA;
      transition: all .3s ease;
    }
    .dot-indicator > div.active {
      background: var(--color-primary);
      width: 24px;
    }
    .dot-indicator > div.done { background: rgba(232,121,164,0.4); }

    /* ─── 최종 카드 ─── */
    .final-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .final-poster {
      border-radius: var(--radius-lg);
      padding: 28px 22px;
      background: linear-gradient(135deg, #FFE4EE 0%, #F3E0FF 100%);
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .final-poster::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.6), transparent 70%);
    }
    .final-poster .badge-emoji {
      font-size: 60px;
      animation: bounce-slow 2.4s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }
    .final-poster img {
      max-width: 220px;
      max-height: 240px;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.5);
      position: relative;
      z-index: 1;
    }
    .final-poster .code {
      margin-top: 14px;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #E879A4, #C084FC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative;
      z-index: 1;
    }
    .final-poster .nick { font-size: 18px; font-weight: 800; color: var(--color-primary-dark); margin-top: 4px; position: relative; z-index: 1; }
    .final-poster .intro { font-size: 13px; color: var(--color-text-light); margin-top: 10px; line-height: 1.7; position: relative; z-index: 1; }

    .final-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 22px 20px;
      border: 1px solid var(--color-line);
      box-shadow: var(--shadow-card);
    }
    .final-card h3 {
      font-size: 15px;
      font-weight: 800;
      color: var(--color-primary-dark);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .final-card .desc {
      font-size: 14px;
      line-height: 1.95;
      color: var(--color-text);
      white-space: pre-wrap;
    }
    .dim-list { display: flex; flex-direction: column; gap: 10px; }
    .dim-item {
      border-radius: 14px;
      padding: 12px 14px;
      background: linear-gradient(180deg, #FFFAFC, #FFF5F9);
      border: 1px solid var(--color-line);
    }
    .dim-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .dim-item-name { font-size: 12.5px; font-weight: 800; color: var(--color-text); }
    .dim-item-score {
      font-size: 11px;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, #E879A4, #C084FC);
      color: #fff;
    }
    .dim-item p { font-size: 12px; line-height: 1.7; color: var(--color-text-light); }

    .author-box {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--color-line);
      overflow: hidden;
    }
    .author-box summary {
      list-style: none;
      cursor: pointer;
      padding: 16px 20px;
      font-size: 14px;
      font-weight: 800;
      color: var(--color-primary-dark);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .author-box summary::-webkit-details-marker { display: none; }
    .author-box summary::after {
      content: '펼치기 ✿';
      font-size: 11px;
      font-weight: 800;
      color: var(--color-primary);
      background: #FFE4EE;
      padding: 5px 11px;
      border-radius: 999px;
    }
    .author-box[open] summary::after { content: '접기 ✿'; }
    .author-box .body { border-top: 1px dashed var(--color-line); padding: 4px 20px 18px; }
    .author-box .body p { margin-top: 12px; font-size: 13px; line-height: 1.85; color: var(--color-text); }

    .share-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
      position: relative;
    }
    .share-actions button {
      padding: 16px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
      position: relative;
    }
    .btn-save {
      background: linear-gradient(135deg, #E879A4 0%, #C084FC 100%);
      color: #fff;
      box-shadow: var(--shadow-btn);
    }
    .btn-save:hover { box-shadow: 0 6px 26px rgba(232,121,164,0.40); transform: translateY(-1px); }
    .btn-share {
      background: #fff;
      color: var(--color-primary);
      border: 2px solid #FFE4EE;
    }
    .btn-share:hover { border-color: var(--color-primary); background: #FFF9FC; }
    .save-menu {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      right: 50%;
      margin-right: 5px;
      background: #fff;
      border: 1px solid var(--color-line);
      border-radius: 18px;
      box-shadow: 0 12px 32px rgba(232,121,164,0.22);
      overflow: hidden;
      z-index: 10;
      animation: fade-in .2s ease-out;
    }
    .save-menu button {
      width: 100%;
      padding: 14px 16px;
      background: none;
      color: var(--color-text);
      font-size: 13px;
      font-weight: 700;
      text-align: left;
      border-radius: 0;
      box-shadow: none;
    }
    .save-menu button:hover { background: #FFF5F9; }
    .save-menu .divider { height: 1px; background: var(--color-line); }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(61, 44, 62, 0.92);
      color: #fff;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      z-index: 9999;
      animation: fade-in .25s ease-out;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    .final-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }
    .final-actions button {
      padding: 16px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
    }
    .btn-restart {
      background: #fff;
      color: var(--color-primary);
      border: 2px solid #FFE4EE;
    }

    .btn-home {
      background: linear-gradient(135deg, #E879A4 0%, #C084FC 100%);
      color: #fff;
      box-shadow: var(--shadow-btn);
    }

    /* ─── 캡처 전용 카드 (화면 밖에서 렌더링) ─── */
    .capture-stage {
      position: fixed;
      top: 0;
      left: -10000px;
      pointer-events: none;
    }
    .capture-card {
      width: 540px;
      padding: 40px 36px 32px;
      background: linear-gradient(135deg, #FFE4EE 0%, #F8E5FF 50%, #F3E0FF 100%);
      border-radius: 36px;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--color-text);
      position: relative;
      overflow: hidden;
    }
    .capture-card::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.7), transparent 70%);
    }
    .capture-card::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(192,132,252,0.25), transparent 70%);
    }
    .capture-brand {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.18em;
      color: var(--color-primary-dark);
      text-align: center;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }
    .capture-tagline {
      font-size: 12px;
      color: var(--color-text-light);
      text-align: center;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    .capture-poster {
      background: rgba(255,255,255,0.55);
      border-radius: 24px;
      padding: 24px 18px 20px;
      text-align: center;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(8px);
    }
    .capture-emoji {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 14px;
    }
    .capture-code {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #E879A4 0%, #C084FC 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.05;
    }
    .capture-nick {
      font-size: 22px;
      font-weight: 900;
      color: var(--color-primary-dark);
      margin-top: 4px;
    }
    .capture-intro {
      font-size: 14px;
      color: var(--color-text-light);
      margin-top: 12px;
      line-height: 1.6;
      font-weight: 600;
    }
    .capture-models {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 22px;
      position: relative;
      z-index: 1;
    }
    .capture-model {
      background: rgba(255,255,255,0.7);
      border-radius: 14px;
      padding: 12px 6px 10px;
      text-align: center;
    }
    .capture-model .icon { font-size: 18px; line-height: 1; }
    .capture-model .label { font-size: 10px; color: var(--color-text-light); margin-top: 4px; font-weight: 700; }
    .capture-model .pct {
      font-size: 14px;
      font-weight: 900;
      margin-top: 2px;
      background: linear-gradient(135deg, #E879A4, #C084FC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .capture-footer {
      margin-top: 22px;
      text-align: center;
      font-size: 11px;
      color: var(--color-text-light);
      position: relative;
      z-index: 1;
      line-height: 1.6;
    }
    .capture-footer .url {
      font-weight: 800;
      color: var(--color-primary);
    }

    .footer-tip {
      text-align: center;
      font-size: 11px;
      color: var(--color-text-dim);
      line-height: 1.7;
      margin-top: 8px;
    }

    @media (max-width: 380px) {
      .shell { padding: 14px 16px 28px; }
      .intro-title { font-size: 24px; }
      .quiz-question { font-size: 16px; }
      .quiz-question.long { font-size: 13px; }
      .reveal-code { font-size: 46px; }
    }
  </style>
</head>

      },
      "So2": {
        "L": "관계에서 가까워지고 융합되길 원한다. 친해지면 쉽게 내부 서클로 들인다.",

        "H": "경계감이 강한 편이다. 너무 가까워지면 본능적으로 반 발짝 물러선다."
      },
      "So3": {
        "L": "표현이 더 직접적이다. 마음에 있는 건 보통 안 돌린다.",
        "M": "분위기 봐서 말한다. 진실과 체면을 보통 반반씩 남긴다.",
        "H": "다양한 상황에서 자기 전환이 능숙하다. 진실성을 층층이 분배한다."

    const dimensionOrder = ['S1','S2','S3','E1','E2','E3','A1','A2','A3','Ac1','Ac2','Ac3','So1','So2','So3'];

    const DRUNK_TRIGGER_QUESTION_ID = 'drink_gate_q2';

    // ─── 상태 ───
    const state = {
      shuffledQuestions: [],
      visibleQuestions: [],
      questionIndex: 0,
      answers: {},
      result: null,
      resultStep: 0,
      animLock: false,
    };

    const screens = {
      intro: document.getElementById('intro'),
      quiz: document.getElementById('quiz'),
      analyzing: document.getElementById('analyzing'),
      result: document.getElementById('result'),
    };

    function showScreen(name) {
      Object.entries(screens).forEach(([k, el]) => el.classList.toggle('active', k === name));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ─── 시작 ───
    function startQuiz() {
      state.answers = {};
      state.questionIndex = 0;
      const shuffled = shuffle(questions);
      const insertIdx = Math.floor(Math.random() * shuffled.length) + 1;
      state.shuffledQuestions = [
        ...shuffled.slice(0, insertIdx),
        specialQuestions[0],
        ...shuffled.slice(insertIdx),
      ];
      rebuildVisible();
      showScreen('quiz');
      renderQuestion();
    }

    function rebuildVisible() {
      const base = [...state.shuffledQuestions];
      const idx = base.findIndex(q => q.id === 'drink_gate_q1');
      if (idx !== -1 && state.answers['drink_gate_q1'] === 3) {
        base.splice(idx + 1, 0, specialQuestions[1]);
      }
      state.visibleQuestions = base;
    }

    // ─── 문항 렌더 ───
    const QUIZ_EMOJIS = ['🌸','💕','✨','🌷','💖','🎀','🦋','🌟','💫','🌺'];

    function renderQuestion() {
      const total = state.visibleQuestions.length;
      const idx = state.questionIndex;
      const q = state.visibleQuestions[idx];
      if (!q) return;

      // 진행도
      const num = idx + 1;
      const pct = Math.round((num / total) * 100);
      document.getElementById('progressNum').textContent = `${num} / ${total}`;
      document.getElementById('progressPct').textContent = `${pct}%`;
      document.getElementById('progressBar').style.width = `${pct}%`;

      // 단계 메시지 (1/3, 2/3 지점)
      const stageMsg = document.getElementById('stageMsg');
      const third = Math.floor(total / 3);
      if (num === third + 1) {
        stageMsg.innerHTML = '<div class="stage-pill">잘하고 있어요! 조금만 더 💪</div>';
      } else if (num === third * 2 + 1) {
        stageMsg.innerHTML = '<div class="stage-pill">거의 다 왔어요! ✨</div>';
      } else {
        stageMsg.innerHTML = '';
      }

      // 이모지 (질문마다 회전)
      document.getElementById('quizEmoji').textContent = QUIZ_EMOJIS[idx % QUIZ_EMOJIS.length];

      // 질문 텍스트 (긴 문항은 별도 스타일)
      const qEl = document.getElementById('quizQuestion');
      qEl.textContent = q.text;
      qEl.className = 'quiz-question' + (q.text.length > 60 ? ' long' : '');

      // 옵션
      const opts = document.getElementById('quizOptions');
      opts.innerHTML = '';
      q.options.forEach((opt, i) => {
        const code = ['A','B','C','D'][i] || String(i + 1);
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.style.animationDelay = `${0.1 + i * 0.08}s`;
        btn.innerHTML = `<span class="option-code">${code}</span><span>${escapeHtml(opt.label)}</span>`;
        const isSelected = state.answers[q.id] === opt.value;
        if (isSelected) btn.classList.add('selected');
        btn.addEventListener('click', () => selectOption(q, opt, btn));
        opts.appendChild(btn);
      });

      // 이전 버튼
      document.getElementById('backBtn').style.display = idx > 0 ? 'block' : 'none';
    }

    function selectOption(q, opt, btn) {
      if (state.animLock) return;
      state.animLock = true;

      // 시각적 선택 표시
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');

      state.answers[q.id] = opt.value;

      // drink_gate_q1 처리: 음주(3) 선택 시 q2 삽입
      if (q.id === 'drink_gate_q1') {
        rebuildVisible();
      }

      setTimeout(() => {
        state.animLock = false;
        if (state.questionIndex < state.visibleQuestions.length - 1) {
          state.questionIndex++;
          renderQuestion();
        } else {
          goToAnalyzing();
        }
      }, 320);
    }

    function goBack() {
      if (state.questionIndex > 0) {
        state.questionIndex--;
        renderQuestion();
      }
    }

    // ─── 분석 화면 ───
    function goToAnalyzing() {
      showScreen('analyzing');
      setTimeout(() => {
        state.result = computeResult();
        state.resultStep = 0;
        showScreen('result');
        renderResultStep();
      }, 2400);
    }

    // ─── 점수 계산 ───
    function sumToLevel(score) {
      if (score <= 3) return 'L';
      if (score === 4) return 'M';
      return 'H';
    }
    function levelNum(level) { return { L:1, M:2, H:3 }[level]; }
    function parsePattern(p) { return p.replace(/-/g, '').split(''); }
    function getDrunkTriggered() { return state.answers[DRUNK_TRIGGER_QUESTION_ID] === 2; }

    function computeResult() {
      const rawScores = {};
      const levels = {};
      Object.keys(dimensionMeta).forEach(d => { rawScores[d] = 0; });
      questions.forEach(q => { rawScores[q.dim] += Number(state.answers[q.id] || 0); });
      Object.entries(rawScores).forEach(([d, s]) => { levels[d] = sumToLevel(s); });

      const userVec = dimensionOrder.map(d => levelNum(levels[d]));
      const ranked = NORMAL_TYPES.map(t => {
        const v = parsePattern(t.pattern).map(levelNum);
        let dist = 0, exact = 0;
        for (let i = 0; i < v.length; i++) {
          const diff = Math.abs(userVec[i] - v[i]);
          dist += diff;
          if (diff === 0) exact += 1;
        }
        const sim = Math.max(0, Math.round((1 - dist / 30) * 100));
        return { ...t, ...TYPE_LIBRARY[t.code], distance: dist, exact, similarity: sim };
      }).sort((a, b) => {
        if (a.distance !== b.distance) return a.distance - b.distance;
        if (b.exact !== a.exact) return b.exact - a.exact;
        return b.similarity - a.similarity;
      });

      const best = ranked[0];
      let finalType, kicker, badge, sub, special = false;
      if (getDrunkTriggered()) {
        finalType = TYPE_LIBRARY.DRUNK;
        kicker = '숨겨진 인격 발견';
        badge = '매칭도 100% · 알코올 인자 접수';
        sub = '에탄올 친화도가 너무 강해서, 일반 인격 심사는 그냥 건너뛰었어요.';
        special = true;
      } else if (best.similarity < 60) {
        finalType = TYPE_LIBRARY.HHHH;
        kicker = '시스템 강제 배정';
        badge = `최고 매칭이 ${best.similarity}%밖에 안 나옴`;
        sub = '표준 인격 라이브러리가 당신의 뇌 회로 앞에서 단체 파업을 일으켰어요.';
        special = true;
      } else {
        finalType = best;
        kicker = '당신의 메인 유형';
        badge = `매칭도 ${best.similarity}% · 정확 일치 ${best.exact}/15`;
        sub = '차원 적중률이 높네요. 1차 인격 초상으로 보면 됩니다.';
      }

      // 5개 모델별 평균 (차원 점수 1~9 → 백분율)
      const MODELS = [
        { key: '자아',  dims: ['S1','S2','S3'],   emoji: '🪞' },
        { key: '감정',  dims: ['E1','E2','E3'],   emoji: '💗' },
        { key: '태도',  dims: ['A1','A2','A3'],   emoji: '🌍' },
        { key: '행동',  dims: ['Ac1','Ac2','Ac3'],emoji: '⚡' },
        { key: '사교',  dims: ['So1','So2','So3'],emoji: '🌸' },
      ];
      const modelScores = MODELS.map(m => {
        const sum = m.dims.reduce((acc, d) => acc + (rawScores[d] || 0), 0);
        // 각 차원 최대 6점 → 모델 합 최대 18, 최소 6
        const pct = Math.round(((sum - 6) / 12) * 100);
        return { ...m, pct: Math.max(5, Math.min(100, pct)) };
      });

      // 강한 / 약한 차원 추출
      const dimEntries = dimensionOrder.map(d => ({
        dim: d,
        name: dimensionMeta[d].name,
        level: levels[d],
        score: rawScores[d],
        text: DIM_EXPLANATIONS[d][levels[d]],
      }));
      const sortedByScore = [...dimEntries].sort((a, b) => b.score - a.score);
      const topDims = sortedByScore.slice(0, 3);
      const lowDims = [...sortedByScore].reverse().slice(0, 3);

      return {
        rawScores, levels, ranked, best, finalType, kicker, badge, sub, special,
        modelScores, dimEntries, topDims, lowDims,
      };
    }

    // ─── 결과 단계 렌더 ───
    // 단계: 0=hint1(메인유형), 1=hint2(강한면), 2=hint3(약한면),
    //       3=axis(5모델), 4=reveal(코드공개), 5=final(최종카드)
    const TOTAL_STEPS = 6;

    function renderResultStep() {
      const r = state.result;
      const step = state.resultStep;
      const root = document.getElementById('resultStep');

      if (step === 0) renderHint1(root, r);
      else if (step === 1) renderHint2(root, r);
      else if (step === 2) renderHint3(root, r);
      else if (step === 3) renderAxis(root, r);
      else if (step === 4) renderReveal(root, r);
      else if (step === 5) renderFinal(root, r);

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function dotIndicator(step) {
      const dots = Array.from({ length: TOTAL_STEPS - 1 }).map((_, i) => {
        let cls = '';
        if (i === step) cls = 'active';
        else if (i < step) cls = 'done';
        return `<div class="${cls}"></div>`;
      }).join('');
      return `<div class="dot-indicator">${dots}</div>`;
    }

    function renderHint1(root, r) {
      root.innerHTML = `
        <div class="step-icon"><div class="emoji-lg">🔮</div></div>
        <div class="step-kicker">분석이 끝났어요!</div>
        <div class="step-heading"><span class="grad">당신의 숨은 인격은...</span></div>
        <div class="hint-cards">
          <div class="hint-card" style="animation-delay:.5s;">
            <span class="label">💫 첫 번째 단서</span>
            마음 깊은 곳에서 어떤 목소리가 들려와요. 작가가 당신을 위해 준비한 인격이 곧 모습을 드러냅니다.
          </div>
          <div class="hint-card" style="animation-delay:.7s;">
            <span class="label">🎀 두 번째 단서</span>
            당신은 <strong>${r.finalType.code}</strong>라는 코드명을 가진 인격에 가까워요. 어떤 의미일까요?
          </div>
        </div>
        ${dotIndicator(0)}
        <button class="step-cta" id="nextStepBtn">다음 →</button>
      `;
      attachNext();
    }

    function renderHint2(root, r) {
      const top = r.topDims;
      root.innerHTML = `
        <div class="step-icon"><div class="emoji-lg">💪</div></div>
        <div class="step-kicker">당신의 강한 면</div>
        <div class="step-heading"><span class="grad">이런 점이 두드러져요</span></div>
        <div class="hint-cards">
          ${top.map((d, i) => `
            <div class="hint-card" style="animation-delay:${0.4 + i * 0.15}s;">
              <span class="label">${d.name.replace(/^[A-Za-z0-9]+ /, '')} · ${d.level}</span>
              ${escapeHtml(d.text)}
            </div>
          `).join('')}
        </div>
        ${dotIndicator(1)}
        <button class="step-cta" id="nextStepBtn">다음 →</button>
      `;
      attachNext();
    }

    function renderHint3(root, r) {
      const low = r.lowDims;
      root.innerHTML = `
        <div class="step-icon"><div class="emoji-lg">🌙</div></div>
        <div class="step-kicker">그리고 약한 면</div>
        <div class="step-heading"><span class="grad">반대로 이런 면도</span></div>
        <div class="hint-cards">
          ${low.map((d, i) => `
            <div class="hint-card" style="animation-delay:${0.4 + i * 0.15}s;">
              <span class="label">${d.name.replace(/^[A-Za-z0-9]+ /, '')} · ${d.level}</span>
              ${escapeHtml(d.text)}
            </div>
          `).join('')}
        </div>
        ${dotIndicator(2)}
        <button class="step-cta" id="nextStepBtn">5가지 모델 보기 →</button>
      `;
      attachNext();
    }

    function renderAxis(root, r) {
      root.innerHTML = `
        <div class="step-icon"><div class="emoji-lg">📊</div></div>
        <div class="step-kicker">5가지 모델 분석</div>
        <div class="step-heading"><span class="grad">이런 균형을 가졌어요</span></div>
        <div class="axis-list">
          ${r.modelScores.map((m, i) => `
            <div class="axis-item" style="animation-delay:${0.3 + i * 0.12}s;">
              <div class="axis-top">
                <span class="axis-name">${m.emoji} ${m.key} 모델</span>
                <span class="axis-pct">${m.pct}%</span>
              </div>
              <div class="axis-bar"><span style="width:0;" data-w="${m.pct}"></span></div>
            </div>
          `).join('')}
        </div>
        ${dotIndicator(3)}
        <button class="step-cta" id="nextStepBtn">결과 타입 보기 →</button>
      `;
      // 막대 애니메이션
      setTimeout(() => {
        document.querySelectorAll('.axis-bar > span').forEach(s => {
          s.style.width = s.dataset.w + '%';
        });
      }, 100);
      attachNext();
    }

    function renderReveal(root, r) {
      const t = r.finalType;
      root.innerHTML = `
        <div class="step-icon"><div class="emoji-lg">✨</div></div>
        <div class="step-kicker">${r.kicker}</div>
        <div class="reveal-code">${t.code}</div>
        <div class="reveal-nick">${t.cn}</div>
        <div class="reveal-intro">${escapeHtml(t.intro)}</div>
        <div class="match-pill">${escapeHtml(r.badge)}</div>
        ${dotIndicator(4)}
        <button class="step-cta" id="nextStepBtn">자세한 카드 보기 →</button>
      `;
      attachNext();
    }

    function renderFinal(root, r) {
      const t = r.finalType;
      const imgSrc = TYPE_IMAGES[t.code];
      root.innerHTML = `
        <div class="final-wrap">
          <div class="final-poster">
            ${imgSrc
              ? `<img id="finalImg" src="${imgSrc}" alt="${t.code}" />`
              : `<div class="badge-emoji">🎀</div>`}
            <div class="code">${t.code}</div>
            <div class="nick">${t.cn}</div>
            <div class="intro">${escapeHtml(t.intro)}</div>
          </div>

          <div class="share-actions">
            <button class="btn-save" id="saveBtn">📥 카드 저장</button>
            <button class="btn-share" id="shareBtn">📤 공유하기</button>
            <div class="save-menu" id="saveMenu" style="display:none;">
              <button id="copyImgBtn">📋 이미지 복사</button>
              <div class="divider"></div>
              <button id="downloadBtn">💾 이미지 저장</button>
              <div class="divider"></div>
              <button id="copyLinkBtn">🔗 링크 복사</button>
            </div>
          </div>

          <div class="final-card">
            <h3>💌 이 인격에 대하여</h3>
            <p class="desc">${escapeHtml(t.desc)}</p>
          </div>

          <div class="final-card">
            <h3>📊 15차원 세부 점수</h3>
            <div class="dim-list">
              ${r.dimEntries.map(d => `
                <div class="dim-item">
                  <div class="dim-item-top">
                    <span class="dim-item-name">${d.name}</span>
                    <span class="dim-item-score">${d.level} · ${d.score}점</span>
                  </div>
                  <p>${escapeHtml(d.text)}</p>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="final-card">
            <h3>🌷 한 가지 부탁</h3>
            <p style="font-size:13px; line-height:1.75; color:var(--color-text-light);">
              ${r.special
                ? '재미로 보세요. 숨겨진 인격과 HHHH 보정은 작가가 일부러 심어둔 장치예요. 의학·심리학·명리학적 근거로 쓰진 말기.'
                : '재미로 보세요. 진단, 면접, 소개팅, 이별, 굿, 사주, 인생 판결문 같은 데에 쓰진 말기. 웃는 건 환영이지만 너무 진지해지진 말 것.'}
            </p>
          </div>

          <details class="author-box">
            <summary>💖 작가의 말</summary>
            <div class="body">
              <p>이 테스트는 비리비리 유저 蛆肉儿串儿(UID 417038183)이 처음 공개했어요. 원래는 술을 좋아하는 친구한테 금주를 권하려고 만든 거였답니다.</p>
              <p>작가의 인격이 SHIT(투덜이)라서 모두를 평등하게 까버렸어요. 진짜 죄송합니다!! 그래도 저는 절세 미녀라서 분명 용서해주실 거라 믿어요.</p>
              <p>오락성이랑 전문성 균형을 잘 못 맞춰서, 일부 인격 해석은 좀 모호하거나 아예 부정확할 수 있어요(예: 찐따가 사실 찐따가 아닐 수도). 기분 나쁘셨다면 진짜 죄송합니다!!</p>
              <p>한국어판 메모: 원본의 중국 인터넷 밈·브랜드는 한국 정서에 맞춰 일부 의역했어요.</p>
            </div>
          </details>

          <div class="final-actions">
            <button class="btn-restart" id="restartBtn">다시 하기</button>
            <button class="btn-home" id="toTopBtn">홈으로 🌸</button>
          </div>
          <p class="footer-tip">🌸 결과가 마음에 들었다면 친구한테도 공유해보세요</p>
        </div>

        <!-- 캡처 전용 카드 (화면 밖) -->
        <div class="capture-stage" aria-hidden="true">
          <div class="capture-card" id="captureCard">
            <div class="capture-brand">S B T I</div>
            <div class="capture-tagline">MBTI는 이제 그만, SBTI 차례 ✨</div>
            <div class="capture-poster">
              <div class="capture-emoji">${imgSrc ? '' : '🎀'}</div>
              <div class="capture-code">${t.code}</div>
              <div class="capture-nick">${t.cn}</div>
              <div class="capture-intro">${escapeHtml(t.intro)}</div>
            </div>
            <div class="capture-models">
              ${r.modelScores.map(m => `
                <div class="capture-model">
                  <div class="icon">${m.emoji}</div>
                  <div class="label">${m.key}</div>
                  <div class="pct">${m.pct}%</div>
                </div>
              `).join('')}
            </div>
            <div class="capture-footer">
              지금 나의 SBTI 인격 알아보기 →<br/>
              <span class="url">sbti-ko.vercel.app</span>
            </div>
          </div>
        </div>
      `;

      // 이미지 로드 실패 폴백
      const img = document.getElementById('finalImg');
      if (img) {
        img.onerror = () => { img.outerHTML = '<div class="badge-emoji">🎀</div>'; };
      }

      document.getElementById('restartBtn').addEventListener('click', startQuiz);
      document.getElementById('toTopBtn').addEventListener('click', () => showScreen('intro'));

      // ─── 캡처/공유 ───
      const saveBtn = document.getElementById('saveBtn');
      const shareBtn = document.getElementById('shareBtn');
      const saveMenu = document.getElementById('saveMenu');

      saveBtn.addEventListener('click', () => {
        saveMenu.style.display = saveMenu.style.display === 'none' ? 'block' : 'none';
      });
      // 메뉴 외부 클릭 닫기
      document.addEventListener('click', (e) => {
        if (!saveBtn.contains(e.target) && !saveMenu.contains(e.target)) {
          saveMenu.style.display = 'none';
        }
      });

      document.getElementById('copyImgBtn').addEventListener('click', () => copyImageToClipboard(t));
      document.getElementById('downloadBtn').addEventListener('click', () => downloadCard(t));
      document.getElementById('copyLinkBtn').addEventListener('click', copyLink);
      shareBtn.addEventListener('click', () => shareCard(t));
    }

    // ─── 캡처 / 공유 로직 ───
    async function captureCard() {
      const node = document.getElementById('captureCard');
      if (!node || typeof htmlToImage === 'undefined') return null;
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch {}
      }
      await new Promise(r => requestAnimationFrame(() => r()));
      try {
        return await htmlToImage.toBlob(node, {
          pixelRatio: 2,
          cacheBust: true,
          backgroundColor: '#FFE4EE',
        });
      } catch (e) {
        console.error('capture failed', e);
        return null;
      }
    }

    function showToast(msg) {
      const old = document.querySelector('.toast');
      if (old) old.remove();
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2200);
    }

    async function downloadCard(type) {
      document.getElementById('saveMenu').style.display = 'none';
      showToast('이미지 만드는 중...');
      const blob = await captureCard();
      if (!blob) { showToast('이미지 생성 실패 😢'); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `SBTI_${type.code}_${type.cn}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('저장 완료! 💾');
    }

    async function copyImageToClipboard(type) {
      document.getElementById('saveMenu').style.display = 'none';
      showToast('이미지 복사 중...');
      const blob = await captureCard();
      if (!blob) { showToast('이미지 생성 실패 😢'); return; }
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        showToast('클립보드에 복사됐어요! 📋');
      } catch (e) {
        showToast('복사 실패. 저장을 써보세요 😢');
      }
    }

    async function copyLink() {
      document.getElementById('saveMenu').style.display = 'none';
      try {
        await navigator.clipboard.writeText('https://sbti-ko.vercel.app');
        showToast('링크 복사 완료! 🔗');
      } catch {
        showToast('복사 실패 😢');
      }
    }

    async function shareCard(type) {
      const text = `나의 SBTI 인격은 ${type.code}(${type.cn})! ${type.intro}`;
      const url = 'https://sbti-ko.vercel.app';
      // Web Share API (모바일)
      if (navigator.share) {
        try {
          // 이미지 첨부 시도
          const blob = await captureCard();
          if (blob && navigator.canShare) {
            const file = new File([blob], `SBTI_${type.code}.png`, { type: 'image/png' });
            if (navigator.canShare({ files: [file] })) {
              await navigator.share({ title: 'SBTI 인격 테스트', text, url, files: [file] });
              return;
            }
          }
          await navigator.share({ title: 'SBTI 인격 테스트', text, url });
        } catch (e) {
          if (e.name !== 'AbortError') showToast('공유 취소됨');
        }
      } else {
        // 데스크톱: 텍스트+링크 클립보드 복사
        try {
          await navigator.clipboard.writeText(`${text}\n${url}`);
          showToast('공유 텍스트 복사 완료! 📤');
        } catch {
          showToast('공유 실패 😢');
        }
      }
    }

    function attachNext() {
      const btn = document.getElementById('nextStepBtn');
      if (btn) btn.addEventListener('click', () => {
        if (state.resultStep < TOTAL_STEPS - 1) {
          state.resultStep++;
          renderResultStep();
        }
      });
    }

    // ─── 이벤트 바인딩 ───
    document.getElementById('startBtn').addEventListener('click', startQuiz);
    document.getElementById('backBtn').addEventListener('click', goBack);
  </script>
</body>
</html>
